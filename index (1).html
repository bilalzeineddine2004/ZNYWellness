function estimateFood(desc){
  const d=desc.toLowerCase().replace(/[,\.!?&]/g,' ').replace(/\s+/g,' ').trim();
  if(!d)return null;
  const keys=Object.keys(FOOD_DB).sort((a,b)=>b.length-a.length);
  let matched=[];let remaining=d;
  for(const k of keys){
    const idx=remaining.indexOf(k);
    if(idx!==-1){matched.push({k,f:FOOD_DB[k]});remaining=remaining.substring(0,idx)+remaining.substring(idx+k.length);}
  }
  let mult=1;
  const nm=d.match(/(\d+)\s/);if(nm&&parseInt(nm[1])>1&&parseInt(nm[1])<10)mult=parseInt(nm[1]);
  if(/large|big|extra/i.test(d))mult*=1.4;
  if(/small|half|lite|light/i.test(d))mult*=0.6;
  if(/double|two|2x/i.test(d)&&mult===1)mult=2;
  if(/triple|three|3x/i.test(d)&&mult===1)mult=3;
  if(matched.length===0){
    if(/breakfast/i.test(d))return{name:"Breakfast",cal:500,p:25,c:55,f:18};
    if(/lunch/i.test(d))return{name:"Lunch",cal:600,p:35,c:60,f:20};
    if(/dinner|supper/i.test(d))return{name:"Dinner",cal:700,p:40,c:65,f:25};
    if(/snack/i.test(d))return{name:"Snack",cal:250,p:10,c:30,f:10};
    return{name:desc,cal:400,p:20,c:45,f:15};
  }
  let t={cal:0,p:0,c:0,f:0};const names=[];
  matched.forEach(({k,f})=>{
    const sv=f.s/100*mult;
    t.cal+=Math.round(f.cal*sv);t.p+=Math.round(f.p*sv);t.c+=Math.round(f.c*sv);t.f+=Math.round(f.f*sv);
    names.push(k.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '));
  });
  return{name:names.join(' + '),cal:t.cal,p:t.p,c:t.c,f:t.f};
}

function detectExercise(name){
  const n=name.toLowerCase().trim();
  for(const ex of EX_DB){for(const k of ex.k){if(n.includes(k))return{name:name.charAt(0).toUpperCase()+name.slice(1),primary:ex.p,secondary:ex.s,note:ex.n||"",sets:ex.st||3,reps:ex.r||"10-12",isCore:ex.co||false};}}
  // Keyword fallback
  let p=[],s=[];
  if(/curl|bicep/i.test(n))p=["Biceps"];
  else if(/press|push|bench/i.test(n)){p=["Chest","Front Delts"];s=["Triceps"];}
  else if(/row|pull/i.test(n)){p=["Upper Back","Lats"];s=["Biceps"];}
  else if(/squat|lunge|leg press/i.test(n)){p=["Quads","Glutes"];s=["Core"];}
  else if(/raise|lateral/i.test(n))p=["Side Delts"];
  else if(/fly|flye/i.test(n))p=["Chest"];
  else if(/extension|pushdown|kickback|tricep/i.test(n))p=["Triceps"];
  else if(/calf/i.test(n))p=["Calves"];
  else if(/ab|core|crunch|plank|pallof|woodchop/i.test(n)){p=["Core"];return{name,primary:p,secondary:[],note:"",sets:3,reps:"12-15",isCore:true};}
  else if(/deadlift|rdl|hip thrust/i.test(n)){p=["Hamstrings","Glutes"];s=["Core","Lower Back"];}
  else if(/shrug|trap/i.test(n))p=["Upper Back"];
  else{p=["Upper Back"];s=["Core"];}
  return{name,primary:p,secondary:s,note:"",sets:3,reps:"10-12",isCore:false};
}

        <div style={{fontFamily:"'Oswald'",fontSize:44,fontWeight:700,lineHeight:1}}>{isToday(currentDate)?"TODAY":dayNames[currentDow].toUpperCase()}</div>
        <div style={{fontFamily:"'Oswald'",fontSize:44,fontWeight:700,lineHeight:1,color:C.gold}}>{sched.title}</div>
        <div style={{fontSize:13,color:C.sub,marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>{sched.sub}</div>

        {/* Date Nav */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12,paddingBottom:12}}>
          <button onClick={()=>setCurrentDate(fmtDate(addDays(new Date(currentDate+"T12:00:00"),-1)))} style={{background:"none",border:"1px solid #333",borderRadius:8,padding:"6px 12px",color:C.sub,fontSize:16,cursor:"pointer"}}>‹</button>
          <div style={{flex:1,display:"flex",gap:4}}>
            {SCHEDULE.map((s,i)=>{
              const d=new Date(currentDate+"T12:00:00");
              const diff=i-currentDow;
              const targetDate=fmtDate(addDays(d,diff));
              const isSelected=targetDate===currentDate;
              const isTodayDot=targetDate===todayStr;
              return (
                <button key={i} onClick={()=>setCurrentDate(targetDate)} style={{flex:1,padding:"6px 0",borderRadius:6,border:`1px solid ${isSelected?C.gold:"#1a1a1a"}`,background:isSelected?C.gd:"transparent",color:isSelected?C.gold:C.mut,fontSize:10,fontWeight:700,cursor:"pointer",position:"relative",fontFamily:"'DM Sans'"}}>
                  {s.day}
                  {isTodayDot&&<div style={{width:4,height:4,borderRadius:"50%",background:C.gold,position:"absolute",top:1,right:"calc(50% - 2px)"}}/>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>setCurrentDate(fmtDate(addDays(new Date(currentDate+"T12:00:00"),1)))} style={{background:"none",border:"1px solid #333",borderRadius:8,padding:"6px 12px",color:C.sub,fontSize:16,cursor:"pointer"}}>›</button>
          {currentDate!==todayStr&&<button onClick={()=>setCurrentDate(todayStr)} style={{background:C.gold,border:"none",borderRadius:8,padding:"6px 10px",color:"#000",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>Today</button>}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {tab==="workout"&&<WorkoutTab {...{wo,sched,currentDow,dayData,saveDayData,workouts,saveWorkouts,timer,timerOn,startTimer,setTimerOn,setTimer,totalS,doneS,saveExWeight,getLastWeight}}/>}
        {tab==="nutrition"&&<NutritionTab {...{dayData,saveDayData,tots,macros,sched}}/>}
        {tab==="tracker"&&<TrackerTab {...{hist,exWeights}}/>}
        {tab==="vitals"&&<VitalsTab {...{dayData,saveDayData,suppList,saveSupps}}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",background:"#111",borderTop:"1px solid #1a1a1a",zIndex:100,padding:"6px 0 env(safe-area-inset-bottom, 14px)"}}>
        {[{id:"workout",l:"Workout",e:"◎"},{id:"nutrition",l:"Nutrition",e:"◈"},{id:"tracker",l:"Tracker",e:"◉"},{id:"vitals",l:"Vitals",e:"♡"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",color:tab===t.id?C.gold:C.mut,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 0",cursor:"pointer",fontFamily:"'DM Sans'"}}><span style={{fontSize:20}}>{t.e}</span><span style={{fontSize:10,fontWeight:700}}>{t.l}</span></button>
        ))}
      </div>
    </div>
  );
}

/* ══════ WORKOUT TAB ══════ */
function WorkoutTab({wo,sched,currentDow,dayData,saveDayData,workouts,saveWorkouts,timer,timerOn,startTimer,setTimerOn,setTimer,totalS,doneS,saveExWeight,getLastWeight}){
  const[expanded,setExpanded]=useState(null);
  const[adding,setAdding]=useState(false);
  const[addName,setAddName]=useState("");
  const[editing,setEditing]=useState(null);
  const[editForm,setEditForm]=useState({});

  const toggleSet=(key)=>{const newSets={...dayData.sets,[key]:!dayData.sets[key]};saveDayData({sets:newSets});if(!dayData.sets[key])startTimer();};
  const logWeight=(wKey,val)=>{const newWts={...dayData.wts,[wKey]:val};saveDayData({wts:newWts});};

  const addExercise=()=>{
    if(!addName.trim())return;
    const det=detectExercise(addName);
    const u={...workouts};
    if(!u[currentDow])u[currentDow]={title:SCHEDULE[currentDow].title,sub:SCHEDULE[currentDow].sub,exercises:[]};
    u[currentDow]={...u[currentDow],exercises:[...u[currentDow].exercises,{id:uid(),...det}]};
    saveWorkouts(u);setAddName("");setAdding(false);
  };
  const removeExercise=ei=>{const u={...workouts};u[currentDow]={...u[currentDow],exercises:u[currentDow].exercises.filter((_,i)=>i!==ei)};saveWorkouts(u);};
  const moveExercise=(ei,dir)=>{const exs=[...wo.exercises];const ni=ei+dir;if(ni<0||ni>=exs.length)return;[exs[ei],exs[ni]]=[exs[ni],exs[ei]];saveWorkouts({...workouts,[currentDow]:{...workouts[currentDow],exercises:exs}});};
  const saveEdit=(ei)=>{const exs=[...workouts[currentDow].exercises];exs[ei]={...exs[ei],sets:Number(editForm.sets)||exs[ei].sets,reps:editForm.reps||exs[ei].reps,note:editForm.note??exs[ei].note};saveWorkouts({...workouts,[currentDow]:{...workouts[currentDow],exercises:exs}});setEditing(null);};

  if(!wo||!wo.exercises?.length) return (
    <div className="fi" style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:56}}>{sched.icon}</div>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700,marginTop:12,color:C.gold}}>{sched.title}</div>
      <div style={{color:C.sub,marginTop:8,fontSize:14}}>{sched.type==="soccer"?"Fresh legs — get after it.":sched.type==="rest"?"Rest, hydrate, meal prep.":"No exercises yet."}</div>
      {sched.type==="gym"&&<><Btn gold onClick={()=>setAdding(true)} style={{marginTop:16}}>+ Add First Exercise</Btn>{adding&&<div style={{marginTop:12}}><AddExBox {...{addName,setAddName,addExercise,setAdding}}/></div>}</>}
    </div>
  );

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:12}}>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:C.sub,textTransform:"uppercase",letterSpacing:1}}>Sets Completed</div>
          <div style={{display:"flex",alignItems:"baseline",gap:4,marginTop:2}}>
            <span style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700,color:doneS===totalS&&totalS>0?C.grn:C.txt}}>{doneS}</span>
            <span style={{fontSize:14,color:C.mut}}>/ {totalS}</span>
          </div>
        </div>
        <button onClick={()=>timerOn?(setTimerOn(false),setTimer(0)):startTimer()} style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${timerOn?(timer<=10?C.red:C.gold):"#333"}`,background:timerOn?(timer<=10?"#EF444422":C.gd):C.card,color:timerOn?(timer<=10?C.red:C.gold):C.sub,fontSize:14,fontWeight:700,fontFamily:"'Oswald'",letterSpacing:1,cursor:"pointer",animation:timerOn&&timer<=10?"timerPulse .5s ease infinite":"none"}}>
          {timerOn?`⏱ ${timer}s`:"⏱ REST 90s"}
        </button>
      </div>
      <div style={{height:3,background:"#222",borderRadius:2,marginBottom:14}}><div style={{height:"100%",width:`${totalS?(doneS/totalS)*100:0}%`,background:`linear-gradient(90deg,${C.gold},#E8C66A)`,borderRadius:2,transition:"width .4s"}}/></div>

      {wo.exercises.map((ex,ei)=>{
        const allD=Array.from({length:ex.sets},(_,si)=>dayData.sets[`${currentDow}-${ei}-${si}`]).every(Boolean);
        const isExp=expanded===ei;const wKey=`${currentDow}-${ei}`;
        const lastW=getLastWeight(ex.name);const curW=dayData.wts[wKey]||"";
        const displayW=curW||lastW;

        return (
          <div key={ex.id||ei} style={{background:allD?"#22C55E0C":C.card,border:`1px solid ${allD?"#22C55E33":ex.isCore?C.gold+"55":C.cb}`,borderRadius:14,padding:"14px 16px",marginBottom:10,borderLeft:ex.isCore?`3px solid ${C.gold}`:undefined}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>{setExpanded(isExp?null:ei);setEditing(null);}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:allD?C.grn:C.txt}}>{ex.name}</div>
                <div style={{fontSize:12,color:ex.isCore?C.gold:C.sub,fontStyle:"italic",marginTop:2}}>{ex.note}</div>
              </div>
              <div style={{fontFamily:"'Oswald'",fontSize:16,fontWeight:600,color:C.gold,whiteSpace:"nowrap",marginLeft:12}}>{ex.sets}×{ex.reps}</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
              {(ex.primary||[]).map(m=><span key={m} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:C.gold+"22",color:C.gold}}>{m}</span>)}
              {(ex.secondary||[]).map(m=><span key={m} style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,background:"#ffffff08",color:C.sub}}>{m}</span>)}
            </div>

            {isExp&&<div style={{marginTop:10}}>
              {editing===ei?<div style={{display:"flex",flexDirection:"column",gap:6,padding:10,background:"#111",borderRadius:8,marginBottom:8}}>
                <div style={{display:"flex",gap:6}}><div style={{flex:1}}><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Sets</div><input type="number" value={editForm.sets} onChange={e=>setEditForm({...editForm,sets:e.target.value})} style={smallInputS}/></div><div style={{flex:1}}><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Reps</div><input value={editForm.reps} onChange={e=>setEditForm({...editForm,reps:e.target.value})} style={smallInputS}/></div></div>
                <div><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Note</div><input value={editForm.note} onChange={e=>setEditForm({...editForm,note:e.target.value})} style={smallInputS}/></div>
                <div style={{display:"flex",gap:6}}><Btn green onClick={()=>saveEdit(ei)}>Save</Btn><Btn onClick={()=>setEditing(null)}>Cancel</Btn></div>
              </div>:<>
                <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                  <Btn small onClick={e=>{e.stopPropagation();setEditing(ei);setEditForm({sets:ex.sets,reps:ex.reps,note:ex.note});}}>✎ Edit</Btn>
                  <Btn small onClick={e=>{e.stopPropagation();moveExercise(ei,-1);}}>↑</Btn>
                  <Btn small onClick={e=>{e.stopPropagation();moveExercise(ei,1);}}>↓</Btn>
                  <RemoveBtn label="✕ Remove" onConfirm={()=>removeExercise(ei)} style={{padding:"5px 10px",borderRadius:6,background:"none",border:"1px solid "+C.red+"44",color:C.red,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{color:C.sub,fontSize:12}}>Weight:</span>
                  <input type="text" placeholder={lastW?`Last: ${lastW}`:"e.g. 135"} value={curW} onChange={e=>{logWeight(wKey,e.target.value);}} style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"7px 10px",color:C.txt,fontSize:13,width:100,outline:"none",fontFamily:"'DM Sans'"}}/>
                  <Btn small gold onClick={()=>{if(curW)saveExWeight(ex.name,curW);}}>Save Weight</Btn>
                </div>
                {lastW&&!curW&&<div style={{fontSize:11,color:C.gold,marginBottom:8,marginTop:-4}}>Last session: {lastW} lbs — try to match or beat this</div>}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {Array.from({length:ex.sets},(_,si)=>{const key=`${currentDow}-${ei}-${si}`;const done=!!dayData.sets[key];
                    return <button key={si} onClick={()=>toggleSet(key)} style={{width:46,height:46,borderRadius:"50%",border:`2px solid ${done?C.grn:"#333"}`,background:done?C.grn:"transparent",color:done?"#000":C.sub,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans'",transition:"all .2s"}}>{done?"✓":si+1}</button>;
                  })}
                </div>
              </>}
            </div>}
          </div>
        );
      })}
      {!adding?<button onClick={()=>setAdding(true)} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed #333",background:"transparent",color:C.sub,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>+ Add Exercise</button>:<AddExBox {...{addName,setAddName,addExercise,setAdding}}/>}
      <div style={{height:16}}/>
    </div>
  );
}

function AddExBox({addName,setAddName,addExercise,setAdding}){
  return <Card><Label>Add Exercise</Label><div style={{fontSize:11,color:C.sub,marginBottom:8}}>Type any exercise — muscles auto-detected.</div><div style={{display:"flex",gap:8}}><input placeholder="e.g. Cable Flyes, Leg Extension..." value={addName} onChange={e=>setAddName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExercise()} style={{...inputS,flex:1}}/><Btn gold onClick={addExercise}>Add</Btn></div><Btn small onClick={()=>setAdding(false)} style={{marginTop:8}}>Cancel</Btn></Card>;
}

/* ══════ NUTRITION TAB ══════ */
function NutritionTab({dayData,saveDayData,tots,macros,sched}){
  const[desc,setDesc]=useState("");
  const[result,setResult]=useState(null);
  const[showManual,setShowManual]=useState(false);
  const[form,setForm]=useState({name:"",cal:"",p:"",c:"",f:""});
  const[isFlex,setIsFlex]=useState(false);

  const estimate=()=>{if(!desc.trim())return;setResult(estimateFood(desc));};
  const confirmResult=(flex)=>{if(!result)return;const m={...result,flex,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};saveDayData({meals:[...dayData.meals,m]});setDesc("");setResult(null);};
  const addManual=()=>{if(!form.name)return;const m={name:form.name,cal:+form.cal||0,p:+form.p||0,c:+form.c||0,f:+form.f||0,flex:isFlex,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};saveDayData({meals:[...dayData.meals,m]});setForm({name:"",cal:"",p:"",c:"",f:""});setIsFlex(false);setShowManual(false);};
  const removeMeal=i=>{saveDayData({meals:dayData.meals.filter((_,j)=>j!==i)});};
  const addQuick=q=>{saveDayData({meals:[...dayData.meals,{...q,flex:false,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]});};
  const flexN=dayData.meals.filter(m=>m.flex).length;
  const dayLabel=sched.type==="soccer"?"Soccer Day":sched.type==="gym"?"Training Day":"Rest Day";

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>NUTRITION</div>
      <div style={{fontSize:12,color:C.gold,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginTop:-8}}>{dayLabel} · {macros.cal} cal target</div>
      <Card>{[{l:"Calories",v:tots.cal,t:macros.cal,c:C.gold,u:""},{l:"Protein",v:tots.p,t:macros.p,c:C.grn,u:"g"},{l:"Carbs",v:tots.c,t:macros.c,c:C.blu,u:"g"},{l:"Fat",v:tots.f,t:macros.f,c:C.pur,u:"g"}].map((m,i)=>(<div key={i} style={{marginBottom:i<3?12:0}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:C.sub,fontWeight:600}}>{m.l}</span><span style={{fontWeight:600}}>{m.v}{m.u} <span style={{color:C.mut}}>/ {m.t}{m.u}</span></span></div><div style={{height:6,background:"#222",borderRadius:3}}><div style={{height:"100%",width:`${Math.min(100,(m.v/m.t)*100)}%`,background:m.c,borderRadius:3,transition:"width .3s"}}/></div></div>))}</Card>

      <Card>
        <Label>Log a Meal</Label>
        <div style={{display:"flex",gap:8}}><input placeholder='Describe meal... e.g. "chicken breast with rice and broccoli"' value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&estimate()} style={{...inputS,flex:1}}/><Btn gold onClick={estimate}>Estimate</Btn></div>
        {result&&<div style={{marginTop:12,padding:14,background:"#111",borderRadius:10,border:`1px solid ${C.gold}33`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.gold,marginBottom:6}}>{result.name}</div>
          <div style={{display:"flex",gap:10,fontSize:12,color:C.sub,marginBottom:12,flexWrap:"wrap"}}><span><b style={{color:C.txt}}>{result.cal}</b> cal</span><span><b style={{color:C.grn}}>{result.p}g</b> P</span><span><b style={{color:C.blu}}>{result.c}g</b> C</span><span><b style={{color:C.pur}}>{result.f}g</b> F</span></div>
          <div style={{fontSize:11,color:C.sub,marginBottom:8}}>Not right? Adjust below or use Manual entry.</div>
          <div style={{display:"flex",gap:8}}><Btn green onClick={()=>confirmResult(false)} style={{flex:1}}>🥗 Log Clean</Btn><Btn onClick={()=>confirmResult(true)} style={{flex:1,background:"#D4A84333",border:`1px solid ${C.gold}44`,color:C.gold}}>🍕 Log Flex</Btn></div>
        </div>}
      </Card>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><Label>80/20 Split</Label><Btn small onClick={()=>setShowManual(!showManual)}>Manual Entry</Btn></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{padding:"5px 10px",borderRadius:6,fontSize:12,fontWeight:700,background:C.gd2,color:C.grn}}>{dayData.meals.length-flexN} Clean</div><div style={{padding:"5px 10px",borderRadius:6,fontSize:12,fontWeight:700,background:"#D4A84322",color:C.gold}}>{flexN} Flex</div><div style={{marginLeft:"auto",fontSize:12,color:C.sub}}>{dayData.meals.length>0?`${Math.round(((dayData.meals.length-flexN)/dayData.meals.length)*100)}% clean`:""}</div></div>
      </Card>

      {showManual&&<Card><Label>Manual Entry</Label>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <input placeholder="Meal name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={inputS}/>
          <div style={{display:"flex",gap:6}}><input placeholder="Cal" type="number" value={form.cal} onChange={e=>setForm({...form,cal:e.target.value})} style={{...smallInputS,flex:1}}/><input placeholder="Protein" type="number" value={form.p} onChange={e=>setForm({...form,p:e.target.value})} style={{...smallInputS,flex:1}}/><input placeholder="Carbs" type="number" value={form.c} onChange={e=>setForm({...form,c:e.target.value})} style={{...smallInputS,flex:1}}/><input placeholder="Fat" type="number" value={form.f} onChange={e=>setForm({...form,f:e.target.value})} style={{...smallInputS,flex:1}}/></div>
          <div style={{display:"flex",gap:8}}><Btn onClick={()=>setIsFlex(!isFlex)} style={{flex:1,background:isFlex?"#D4A84322":C.card,border:`1px solid ${isFlex?C.gold+"66":"#333"}`,color:isFlex?C.gold:C.sub}}>{isFlex?"🍕 Flex":"🥗 Clean"}</Btn><Btn gold onClick={addManual}>Log Meal</Btn></div>
        </div>
      </Card>}

      {dayData.meals.length>0&&<Card><Label>Today's Meals</Label>{dayData.meals.map((m,i)=>(<div key={i} style={{display:"flex",alignItems:"center",padding:"10px 0",borderTop:i?"1px solid #1a1a1a":"none",gap:8}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:600}}>{m.name}</span>{m.flex&&<span style={{fontSize:9,fontWeight:700,background:"#D4A84333",color:C.gold,padding:"1px 5px",borderRadius:4}}>FLEX</span>}</div><div style={{fontSize:11,color:C.sub,marginTop:2}}>{m.cal} cal · {m.p}g P · {m.c}g C · {m.f}g F{m.time?` · ${m.time}`:""}</div></div><button onClick={()=>removeMeal(i)} style={{background:"none",border:"none",color:C.mut,fontSize:16,cursor:"pointer",padding:"4px 8px"}}>✕</button></div>))}</Card>}

      <Card><Label>Quick Add</Label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{QUICK_MEALS.map((q,i)=>(<button key={i} onClick={()=>addQuick(q)} style={{display:"flex",flexDirection:"column",gap:2,padding:"8px 11px",borderRadius:8,background:"#111",border:"1px solid #222",color:C.txt,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'"}}>{q.name}<span style={{fontSize:10,color:C.sub}}>{q.cal}cal · {q.p}gP</span></button>))}</div></Card>
      <div style={{height:12}}/>
    </div>
  );
}

/* ══════ TRACKER TAB ══════ */
function TrackerTab({hist,exWeights}){
  const streak=(()=>{let s=0;const d=new Date();d.setDate(d.getDate()-1);while(hist[fmtDate(d)]){s++;d.setDate(d.getDate()-1);}return s;})();
  const l14=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);l14.push({date:fmtDate(d).slice(5),dn:shortDays[d.getDay()],data:hist[fmtDate(d)]||null});}

  // Muscle map
  const wm={};const now=new Date();
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);const h=hist[fmtDate(d)];if(h?.muscles)Object.entries(h.muscles).forEach(([m,v])=>{wm[m]=(wm[m]||0)+v;});const dow=d.getDay();if((dow===2||dow===5)&&h){["Quads","Hamstrings","Glutes","Calves","Core","Hip Flexors"].forEach(m=>{wm[m]=(wm[m]||0)+2;});}}
  const mx=Math.max(1,...Object.values(wm));
  const getHC=v=>{if(!v)return"#1a1a1a";const p=v/mx;return p>.7?C.grn:p>.4?C.gold:"#D4A84366";};
  const upper=["Chest","Front Delts","Side Delts","Rear Delts","Triceps","Biceps","Upper Back","Lats"].reduce((a,m)=>a+(wm[m]||0),0);
  const lower=["Quads","Hamstrings","Glutes","Calves","Hip Flexors"].reduce((a,m)=>a+(wm[m]||0),0);
  const core=wm["Core"]||0;

  const pD=l14.filter(d=>d.data?.p).map(d=>({l:d.date,v:d.data.p}));
  const cD=l14.filter(d=>d.data?.cal).map(d=>({l:d.date,v:d.data.cal}));
  const wD=Object.entries(hist).filter(([_,v])=>v.bw).sort(([a],[b])=>a.localeCompare(b)).slice(-14).map(([d,v])=>({l:d.slice(5),v:+v.bw}));
  const wDays=l14.filter(d=>d.data?.setsT>0);const cDays=wDays.filter(d=>d.data.setsD===d.data.setsT).length;

  // Exercise weight history (progressive overload tracker)
  const exWEntries=Object.entries(exWeights).filter(([_,v])=>v).sort(([a],[b])=>a.localeCompare(b));

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>TRACKER</div>
      <div style={{fontSize:12,color:C.gold,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginTop:-8}}>{streak>0?`${streak} day streak`:"Day 1"} · Week {weekNum()}</div>
      <div style={{display:"flex",gap:8}}>{[{n:streak,l:"Streak"},{n:`${cDays}/${wDays.length}`,l:"Workouts"},{n:`Wk ${weekNum()}`,l:"of 4"}].map((s,i)=>(<div key={i} style={{flex:1,background:C.card,borderRadius:12,padding:"12px 10px",textAlign:"center",border:`1px solid ${C.cb}`}}><div style={{fontFamily:"'Oswald'",fontSize:22,fontWeight:700,color:C.gold}}>{s.n}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>))}</div>

      <Card><Label>Muscle Coverage · This Week</Label>
        <div style={{display:"flex",gap:8,marginBottom:14}}>{[{l:"Upper",v:upper,c:C.blu},{l:"Lower",v:lower,c:C.grn},{l:"Core",v:core,c:C.gold}].map((g,i)=>(<div key={i} style={{flex:1,textAlign:"center",padding:"10px 0",background:g.c+"15",borderRadius:10,border:`1px solid ${g.c}33`}}><div style={{fontFamily:"'Oswald'",fontSize:20,fontWeight:700,color:g.c}}>{g.v}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase"}}>{g.l}</div></div>))}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{MUSCLES.map(m=>{const v=wm[m]||0;const col=getHC(v);return <div key={m} style={{padding:"5px 9px",borderRadius:7,background:col+"22",border:`1px solid ${col}55`,fontSize:11,fontWeight:600,color:v?col:C.mut}}>{m}{v>0&&` ·${v}`}</div>;})}</div>
      </Card>

      <Card><Label>14-Day Activity</Label><div style={{display:"flex",gap:3}}>{l14.map((d,i)=>{const w=d.data?.setsT>0;const ok=w&&d.data.setsD===d.data.setsT;return <div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:8,color:C.mut,marginBottom:2}}>{d.dn}</div><div style={{height:26,borderRadius:4,background:ok?C.grn:w?"#D4A84366":d.data?"#ffffff12":"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:ok?"#000":C.mut}}>{ok?"✓":w?"½":""}</div><div style={{fontSize:7,color:C.mut,marginTop:1}}>{d.date}</div></div>;})}</div></Card>

      {/* Progressive Overload Tracker */}
      {exWEntries.length>0&&<Card><Label>Progressive Overload · Saved Weights</Label>
        <div style={{fontSize:11,color:C.sub,marginBottom:10}}>These weights auto-populate next time you do each exercise. Beat them.</div>
        {exWEntries.map(([name,weight])=>(<div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1a1a1a"}}><span style={{fontSize:13,fontWeight:600,textTransform:"capitalize"}}>{name}</span><span style={{fontFamily:"'Oswald'",fontSize:16,fontWeight:700,color:C.gold}}>{weight} lbs</span></div>))}
      </Card>}

      {pD.length>1&&<Card><Label>Protein Trend</Label><MiniChart data={pD} target={155} color={C.grn} unit="g"/></Card>}
      {cD.length>1&&<Card><Label>Calorie Trend</Label><MiniChart data={cD} target={2500} color={C.gold} unit=""/></Card>}
      {wD.length>1&&<Card><Label>Weight Trend</Label><MiniChart data={wD} color={C.blu} unit="lbs"/></Card>}

      <Card><Label>Weekly Averages</Label>{(()=>{const d7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const h=hist[fmtDate(d)];if(h)d7.push(h);}if(!d7.length) return <div style={{fontSize:13,color:C.mut}}>Log a few days first.</div>;const avg=(a,k)=>Math.round(a.reduce((s,d)=>s+(d[k]||0),0)/a.length);return <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{[{l:"Avg Cal",v:avg(d7,"cal"),c:C.gold},{l:"Avg Protein",v:avg(d7,"p")+"g",c:C.grn},{l:"Avg Water",v:(avg(d7,"water")*.25).toFixed(1)+"L",c:C.blu},{l:"Avg Sleep",v:avg(d7,"sleep")+"h",c:C.pur}].map((s,i)=>(<div key={i} style={{flex:1,minWidth:"45%",padding:"10px 12px",background:"#111",borderRadius:10,border:"1px solid #1a1a1a"}}><div style={{fontSize:11,color:C.sub,marginBottom:2}}>{s.l}</div><div style={{fontFamily:"'Oswald'",fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div></div>))}</div>;})()}</Card>
      <div style={{height:12}}/>
    </div>
  );
}

function MiniChart({data,target,color,unit}){
  if(data.length<2) return null;
  const vals=data.map(d=>d.v);const mn=Math.min(...vals,target||Infinity)-5;const mx=Math.max(...vals,target||0)+5;const rng=mx-mn||1;const w=Math.max(260,data.length*36);const h=80;
  const pts=data.map((d,i)=>({x:16+(i/(data.length-1))*(w-32),y:h-10-((d.v-mn)/rng)*(h-25)}));
  const ln=pts.map((p,i)=>`${i?"L":"M"} ${p.x} ${p.y}`).join(" ");
  const tY=target?h-10-((target-mn)/rng)*(h-25):null;
  return <div style={{overflowX:"auto"}}><svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>{tY!=null&&<><line x1={10} y1={tY} x2={w-10} y2={tY} stroke={color} strokeWidth="1" strokeDasharray="4,4" opacity=".3"/><text x={w-8} y={tY-4} textAnchor="end" fill={color} fontSize="8" opacity=".5">{target}{unit}</text></>}<path d={ln} fill="none" stroke={color} strokeWidth="2"/>{pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="3" fill={color}/><text x={p.x} y={p.y-8} textAnchor="middle" fill={C.sub} fontSize="8">{vals[i]}</text><text x={p.x} y={h-1} textAnchor="middle" fill={C.mut} fontSize="7">{data[i].l}</text></g>)}</svg></div>;
}

/* ══════ VITALS TAB ══════ */
function VitalsTab({dayData,saveDayData,suppList,saveSupps}){
  const[waterInput,setWaterInput]=useState(dayData.water);
  const[sleepInput,setSleepInput]=useState(dayData.sleep);
  const[bwInput,setBwInput]=useState(dayData.bw);
  const[addingSup,setAddingSup]=useState(false);
  const[supForm,setSupForm]=useState({name:"",dose:"",when:""});

  // Sync inputs when dayData changes (date navigation)
  useEffect(()=>{setWaterInput(dayData.water);setSleepInput(dayData.sleep);setBwInput(dayData.bw);},[dayData.water,dayData.sleep,dayData.bw]);

  const logWater=(n)=>{setWaterInput(n);saveDayData({water:n});};
  const logSleep=()=>{saveDayData({sleep:sleepInput});};
  const logBw=()=>{saveDayData({bw:bwInput});};
  const toggleSupp=(id)=>{const n={...dayData.supps,[id]:!dayData.supps[id]};saveDayData({supps:n});};
  const addSup=()=>{if(!supForm.name)return;saveSupps([...suppList,{id:uid(),name:supForm.name,dose:supForm.dose,when:supForm.when}]);setSupForm({name:"",dose:"",when:""});setAddingSup(false);};
  const removeSup=id=>{saveSupps(suppList.filter(s=>s.id!==id));};

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>VITALS</div>

      {/* Water */}
      <Card><Label>Water · {(waterInput*.25).toFixed(1)}L / 3L</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>{Array.from({length:12},(_,i)=>(<button key={i} onClick={()=>logWater(i<waterInput?i:i+1)} style={{width:44,height:44,borderRadius:10,border:`1px solid ${i<waterInput?"#3B82F644":"#222"}`,background:i<waterInput?"#3B82F622":"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer",opacity:i<waterInput?1:.3}}>💧</button>))}</div>
        <div style={{fontSize:11,color:C.mut,marginTop:6,textAlign:"center"}}>Tap to fill/unfill · Each = 250ml · Auto-saves</div>
      </Card>

      {/* Sleep */}
      <Card><Label>Sleep</Label>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <input type="range" min="0" max="12" step="0.5" value={sleepInput} onChange={e=>setSleepInput(+e.target.value)}/>
          <div style={{fontFamily:"'Oswald'",fontSize:26,fontWeight:700,color:sleepInput>=7?C.grn:C.gold,minWidth:50,textAlign:"center"}}>{sleepInput}h</div>
          <Btn gold small onClick={logSleep}>Log</Btn>
        </div>
      </Card>

      {/* Body Weight */}
      <Card><Label>Body Weight</Label>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="number" placeholder="148" value={bwInput} onChange={e=>setBwInput(e.target.value)} style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:20,fontWeight:700,width:90,textAlign:"center",outline:"none",fontFamily:"'Oswald'"}}/>
          <span style={{color:C.sub,fontSize:14}}>lbs</span>
          <Btn gold onClick={logBw}>Log Weight</Btn>
        </div>
      </Card>

      {/* Supplements */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Label>Supplements</Label><Btn gold small onClick={()=>setAddingSup(!addingSup)}>+ Add</Btn></div>
        {addingSup&&<div style={{display:"flex",flexDirection:"column",gap:6,padding:10,background:"#111",borderRadius:8,marginBottom:10}}>
          <input placeholder="Name" value={supForm.name} onChange={e=>setSupForm({...supForm,name:e.target.value})} style={smallInputS}/>
          <div style={{display:"flex",gap:6}}><input placeholder="Dose" value={supForm.dose} onChange={e=>setSupForm({...supForm,dose:e.target.value})} style={{...smallInputS,flex:1}}/><input placeholder="When" value={supForm.when} onChange={e=>setSupForm({...supForm,when:e.target.value})} style={{...smallInputS,flex:1}}/></div>
          <div style={{display:"flex",gap:6}}><Btn green onClick={addSup}>Save</Btn><Btn onClick={()=>setAddingSup(false)}>Cancel</Btn></div>
        </div>}
        {suppList.map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a1a1a"}}>
          <button onClick={()=>toggleSupp(s.id)} style={{width:30,height:30,borderRadius:8,border:`2px solid ${dayData.supps[s.id]?C.grn:"#333"}`,background:dayData.supps[s.id]?C.grn:"transparent",color:dayData.supps[s.id]?"#000":C.txt,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{dayData.supps[s.id]?"✓":""}</button>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{s.name}</div><div style={{fontSize:11,color:C.sub}}>{s.dose}{s.when?` · ${s.when}`:""}</div></div>
          <RemoveBtn label="✕" onConfirm={()=>removeSup(s.id)} style={{background:"none",border:"none",color:C.mut,fontSize:12,cursor:"pointer",padding:"4px 8px",fontFamily:"'DM Sans'"}}/>
        </div>))}
      </Card>

      {/* Checklist */}
      <Card><Label>Daily Checklist</Label>{[
        {l:"Protein 155g+",d:dayData.meals.reduce((a,m)=>a+(m.p||0),0)>=155},
        {l:"Water 3L+",d:waterInput>=12},
        {l:"Creatine",d:!!dayData.supps.creatine},
        {l:"7+ hrs sleep",d:sleepInput>=7},
        {l:"Weight logged",d:!!dayData.bw},
      ].map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:c.d?1:.4}}><span style={{color:c.d?C.grn:C.mut,fontWeight:700,fontSize:14}}>{c.d?"✓":"○"}</span><span style={{fontSize:13}}>{c.l}</span></div>))}</Card>
      <div style={{height:12}}/>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
