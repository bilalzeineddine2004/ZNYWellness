function estimateMealLocal(description){
  const desc=description.toLowerCase().replace(/[,\.!?]/g,' ');
  const words=desc.split(/\s+/);
  let matched=[];
  // Try multi-word matches first, then single words
  const keys=Object.keys(FOOD_DB).sort((a,b)=>b.length-a.length);
  let remaining=desc;
  for(const key of keys){
    if(remaining.includes(key)){
      matched.push({key,food:FOOD_DB[key]});
      remaining=remaining.replace(key,'');
    }
  }
  if(matched.length===0){
    // Guess based on keywords
    if(desc.includes('breakfast'))return{name:"Breakfast",cal:500,p:25,c:55,f:18};
    if(desc.includes('lunch'))return{name:"Lunch",cal:600,p:35,c:60,f:20};
    if(desc.includes('dinner'))return{name:"Dinner",cal:700,p:40,c:65,f:25};
    if(desc.includes('snack'))return{name:"Snack",cal:250,p:10,c:30,f:10};
    return{name:description,cal:500,p:25,c:50,f:15};
  }
  // Detect quantity multipliers
  let multiplier=1;
  const numMatch=desc.match(/(\d+)\s*(slice|piece|serving|scoop|cup|bowl)/i);
  if(numMatch)multiplier=parseInt(numMatch[1])||1;
  if(desc.includes('large')||desc.includes('big'))multiplier*=1.3;
  if(desc.includes('small')||desc.includes('little')||desc.includes('half'))multiplier*=0.6;
  if(desc.includes('double')||desc.includes('two')||desc.includes('2 '))multiplier*=2;

  let total={cal:0,p:0,c:0,f:0};
  const names=[];
  matched.forEach(({key,food})=>{
    const s=food.serving/100*multiplier;
    total.cal+=Math.round(food.cal*s);
    total.p+=Math.round(food.p*s);
    total.c+=Math.round(food.c*s);
    total.f+=Math.round(food.f*s);
    names.push(key.charAt(0).toUpperCase()+key.slice(1));
  });
  return{name:names.join(' + '),cal:total.cal,p:total.p,c:total.c,f:total.f};
}

function detectExercise(name){
  const n=name.toLowerCase().trim();
  for(const ex of EX_KEYWORDS){
    for(const k of ex.keys){
      if(n.includes(k))return{name:name.charAt(0).toUpperCase()+name.slice(1),primary:ex.primary,secondary:ex.secondary,note:"",sets:ex.sets||3,reps:ex.reps||"10-12",isCore:ex.isCore||false};
    }
  }
  // Fallback heuristic
  let primary=[],secondary=[];
  if(/curl/i.test(n)){primary=["Biceps"];}
  else if(/press|push/i.test(n)){primary=["Chest","Front Delts"];secondary=["Triceps"];}
  else if(/row|pull/i.test(n)){primary=["Upper Back","Lats"];secondary=["Biceps"];}
  else if(/squat|lunge/i.test(n)){primary=["Quads","Glutes"];secondary=["Core"];}
  else if(/raise/i.test(n)){primary=["Side Delts"];}
  else if(/fly|flye/i.test(n)){primary=["Chest"];}
  else if(/extension|pushdown|kickback/i.test(n)){primary=["Triceps"];}
  else if(/calf/i.test(n)){primary=["Calves"];}
  else if(/ab|core|crunch|plank/i.test(n)){primary=["Core"];}
  else{primary=["Upper Back"];secondary=["Core"];}
  return{name:name,primary,secondary,note:"",sets:3,reps:"10-12",isCore:primary.includes("Core")};
}

const dk=(d=new Date())=>d.toISOString().split("T")[0];

const sG=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const sS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}};
const uid=()=>Math.random().toString(36).slice(2,8);
const inputS={background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 10px",color:C.txt,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"'DM Sans'"};

function RemoveBtn({label,onConfirm,style}){
  const[c,setC]=useState(false);const t=useRef(null);
  useEffect(()=>()=>clearTimeout(t.current),[]);
  return <button onClick={(e)=>{e.stopPropagation();if(c){onConfirm();setC(false);}else{setC(true);t.current=setTimeout(()=>setC(false),2000);}}} style={{...style,...(c?{borderColor:C.red,color:C.red,background:"#EF444418"}:{})}}>{c?"Sure?":label}</button>;
}
function Card({children}){return <div style={{background:C.card,borderRadius:14,padding:"16px 18px",border:`1px solid ${C.cb}`}}>{children}</div>;}

/* ═══════ MAIN APP ═══════ */
function App(){
  const[tab,setTab]=useState("workout");
  const[vd,setVd]=useState(di());
  const[loaded,setLoaded]=useState(false);
  const today=dk();const todayIdx=di();const sched=SCHEDULE[vd];
  const[workouts,setWorkouts]=useState(DEFAULT_WORKOUTS);
  const[suppList,setSuppList]=useState(DEFAULT_SUPPS);
  const[sets,setSets]=useState({});
  const[wts,setWts]=useState({});
  const[meals,setMeals]=useState([]);
  const[water,setWater]=useState(0);
  const[sleepH,setSleepH]=useState(0);
  const[supps,setSupps]=useState({});
  const[bw,setBw]=useState("");
  const[hist,setHist]=useState({});
  const[timer,setTimer]=useState(0);
  const[timerOn,setTimerOn]=useState(false);
  const tRef=useRef(null);

  useEffect(()=>{
    const d=sG(`day-${today}`);
    if(d){setSets(d.sets||{});setWts(d.wts||{});setMeals(d.meals||[]);setWater(d.water||0);setSleepH(d.sleep||0);setSupps(d.supps||{});setBw(d.bw||"");}
    const h=sG("hist");if(h)setHist(h);
    const cw=sG("custom-workouts");if(cw)setWorkouts(cw);
    const cs=sG("custom-supps");if(cs)setSuppList(cs);
    setLoaded(true);
  },[today]);

  useEffect(()=>{
    if(timerOn&&timer>0){tRef.current=setTimeout(()=>setTimer(t=>t-1),1000);}
    else if(timer===0&&timerOn){setTimerOn(false);}
    return()=>clearTimeout(tRef.current);
  },[timer,timerOn]);

  const saveW=w=>{setWorkouts(w);sS("custom-workouts",w);};
  const saveSL=s=>{setSuppList(s);sS("custom-supps",s);};

  const save=useCallback((ov={})=>{
    const data={sets,wts,meals,water,sleep:sleepH,supps,bw,...ov};
    sS(`day-${today}`,data);
    const ms=ov.meals||meals;const cs=ov.sets||sets;
    const mh={};const wo=workouts[todayIdx];
    if(wo){wo.exercises.forEach((ex,ei)=>{
      if(Array.from({length:ex.sets},(_,si)=>cs[`${todayIdx}-${ei}-${si}`]).some(Boolean)){
        (ex.primary||[]).forEach(m=>{mh[m]=(mh[m]||0)+2;});
        (ex.secondary||[]).forEach(m=>{mh[m]=(mh[m]||0)+1;});
      }
    });}
    const nH={...hist,[today]:{p:ms.reduce((a,m)=>a+(m.p||0),0),cal:ms.reduce((a,m)=>a+(m.cal||0),0),c:ms.reduce((a,m)=>a+(m.c||0),0),f:ms.reduce((a,m)=>a+(m.f||0),0),water:ov.water??water,sleep:ov.sleep??sleepH,bw:ov.bw??bw,muscles:mh,dayType:sched.type,setsD:Object.values(cs).filter(Boolean).length,setsT:wo?wo.exercises.reduce((a,e)=>a+e.sets,0):0}};
    setHist(nH);sS("hist",nH);
  },[sets,wts,meals,water,sleepH,supps,bw,today,hist,todayIdx,sched,workouts]);

  const startTimer=()=>{setTimer(90);setTimerOn(true);};
  const toggleSet=key=>{const n={...sets,[key]:!sets[key]};setSets(n);save({sets:n});if(!sets[key])startTimer();};
  const macros=MACROS[sched?.type]||MACROS.rest;
  const tots={cal:meals.reduce((a,m)=>a+(m.cal||0),0),p:meals.reduce((a,m)=>a+(m.p||0),0),c:meals.reduce((a,m)=>a+(m.c||0),0),f:meals.reduce((a,m)=>a+(m.f||0),0)};
  const wo=workouts[vd];
  const totalS=wo?wo.exercises.reduce((a,e)=>a+e.sets,0):0;
  const doneS=Object.keys(sets).filter(k=>k.startsWith(`${vd}-`)&&sets[k]).length;

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg}}><div style={{color:C.gold,fontSize:32,fontWeight:700,letterSpacing:4,fontFamily:"'Oswald'"}}>BILAL</div></div>;

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,color:C.txt,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      <div style={{padding:"20px 20px 0",background:"linear-gradient(180deg,#1a1610 0%,#0C0C0C 100%)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:600,color:C.gold,letterSpacing:2,textTransform:"uppercase"}}>May Lock-In · Week {wk()}</div>
          <div style={{fontSize:12,color:C.sub}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase()}</div>
        </div>
        <div style={{fontFamily:"'Oswald'",fontSize:48,fontWeight:700,lineHeight:1,letterSpacing:1}}>TODAY</div>
        <div style={{fontFamily:"'Oswald'",fontSize:48,fontWeight:700,lineHeight:1,color:C.gold,letterSpacing:1}}>{SCHEDULE[todayIdx].title}</div>
        <div style={{fontSize:13,color:C.sub,marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>{SCHEDULE[todayIdx].sub}</div>
        <div style={{display:"flex",gap:5,marginTop:14,paddingBottom:14}}>
          {SCHEDULE.map((s,i)=>(
            <button key={i} onClick={()=>setVd(i)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1px solid ${i===vd?C.gold:"#222"}`,background:i===vd?C.gd:"transparent",color:i===vd?C.gold:C.sub,fontSize:11,fontWeight:700,cursor:"pointer",position:"relative",fontFamily:"'DM Sans'"}}>
              {s.day}{i===todayIdx&&<div style={{width:5,height:5,borderRadius:"50%",background:C.gold,position:"absolute",top:2,right:"calc(50% - 2.5px)"}}/>}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"0 16px"}}>
        {tab==="workout"&&<WorkoutView {...{sched,wo,vd,sets,toggleSet,wts,setWts,save,totalS,doneS,timer,timerOn,startTimer,setTimer,setTimerOn,workouts,saveW}}/>}
        {tab==="nutrition"&&<NutritionView {...{meals,setMeals,tots,macros,sched,save}}/>}
        {tab==="tracker"&&<TrackerView {...{hist,workouts,todayIdx}}/>}
        {tab==="vitals"&&<VitalsView {...{water,setWater,sleepH,setSleepH,supps,setSupps,bw,setBw,save,hist,meals,suppList,saveSL}}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",background:"#111",borderTop:"1px solid #1a1a1a",zIndex:100,padding:"6px 0 env(safe-area-inset-bottom,14px)"}}>
        {[{id:"workout",l:"Workout",e:"◎"},{id:"nutrition",l:"Nutrition",e:"◈"},{id:"tracker",l:"Tracker",e:"◉"},{id:"vitals",l:"Vitals",e:"♡"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",color:tab===t.id?C.gold:C.mut,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 0",cursor:"pointer",fontFamily:"'DM Sans'"}}>
            <span style={{fontSize:20}}>{t.e}</span><span style={{fontSize:10,fontWeight:700,letterSpacing:.5}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════ WORKOUT VIEW ═══════ */
function WorkoutView({sched,wo,vd,sets,toggleSet,wts,setWts,save,totalS,doneS,timer,timerOn,startTimer,setTimer,setTimerOn,workouts,saveW}){
  const[expanded,setExpanded]=useState(null);
  const[adding,setAdding]=useState(false);
  const[addName,setAddName]=useState("");
  const[editing,setEditing]=useState(null);
  const[editForm,setEditForm]=useState({});

  const addExercise=()=>{
    if(!addName.trim())return;
    const detected=detectExercise(addName);
    const newEx={id:uid(),name:detected.name,sets:detected.sets,reps:detected.reps,note:detected.note,primary:detected.primary,secondary:detected.secondary,isCore:detected.isCore};
    const updated={...workouts};
    if(!updated[vd])updated[vd]={title:SCHEDULE[vd].title,sub:SCHEDULE[vd].sub,exercises:[]};
    updated[vd]={...updated[vd],exercises:[...updated[vd].exercises,newEx]};
    saveW(updated);setAddName("");setAdding(false);
  };
  const removeExercise=ei=>{const u={...workouts};u[vd]={...u[vd],exercises:u[vd].exercises.filter((_,i)=>i!==ei)};saveW(u);};
  const moveExercise=(ei,dir)=>{const exs=[...wo.exercises];const ni=ei+dir;if(ni<0||ni>=exs.length)return;[exs[ei],exs[ni]]=[exs[ni],exs[ei]];const u={...workouts};u[vd]={...u[vd],exercises:exs};saveW(u);};
  const startEdit=ei=>{const ex=wo.exercises[ei];setEditing(ei);setEditForm({sets:ex.sets,reps:ex.reps,note:ex.note});};
  const saveEdit=ei=>{const u={...workouts};const exs=[...u[vd].exercises];exs[ei]={...exs[ei],sets:Number(editForm.sets)||exs[ei].sets,reps:editForm.reps||exs[ei].reps,note:editForm.note??exs[ei].note};u[vd]={...u[vd],exercises:exs};saveW(u);setEditing(null);};

  if(!wo||!wo.exercises?.length) return (
    <div className="fi" style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:56}}>{sched.icon}</div>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700,marginTop:12,color:C.gold}}>{sched.title}</div>
      <div style={{color:C.sub,marginTop:8,fontSize:14}}>{sched.type==="soccer"?"Fresh legs — get after it.":sched.type==="rest"?"Rest up. Hydrate. Meal prep.":"No exercises yet."}</div>
      {sched.type==="gym"&&<><button onClick={()=>setAdding(true)} style={{marginTop:16,padding:"10px 20px",borderRadius:10,background:C.gold,border:"none",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>+ Add First Exercise</button>{adding&&<AddBox {...{addName,setAddName,addExercise,setAdding}}/>}</>}
    </div>
  );

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:12}}>
        <div>
          <span style={{fontSize:12,fontWeight:600,color:C.sub,textTransform:"uppercase",letterSpacing:1}}>Sets Completed</span>
          <div style={{display:"flex",alignItems:"baseline",gap:4,marginTop:2}}>
            <span style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700,color:doneS===totalS&&totalS>0?C.grn:C.txt}}>{doneS}</span>
            <span style={{fontSize:14,color:C.mut}}>/ {totalS}</span>
          </div>
        </div>
        <button onClick={()=>timerOn?(setTimerOn(false),setTimer(0)):startTimer()} style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${timerOn?(timer<=10?C.red:C.gold):"#333"}`,background:timerOn?(timer<=10?"#EF444422":C.gd):C.card,color:timerOn?(timer<=10?C.red:C.gold):C.sub,fontSize:14,fontWeight:700,fontFamily:"'Oswald'",letterSpacing:1,cursor:"pointer",animation:timerOn&&timer<=10?"timerPulse .5s ease infinite":"none"}}>
          {timerOn?`⏱ ${timer}s`:"⏱ REST 90s"}
        </button>
      </div>
      <div style={{height:3,background:"#222",borderRadius:2,marginBottom:14}}><div style={{height:"100%",width:`${totalS?(doneS/totalS)*100:0}%`,background:`linear-gradient(90deg,${C.gold},#E8C66A)`,borderRadius:2,transition:"width .4s ease"}}/></div>

      {wo.exercises.map((ex,ei)=>{
        const allD=Array.from({length:ex.sets},(_,si)=>sets[`${vd}-${ei}-${si}`]).every(Boolean);
        const isExp=expanded===ei;const isEdit=editing===ei;const wKey=`${vd}-${ei}`;
        return (
          <div key={ex.id||ei} style={{background:allD?"#22C55E0C":C.card,border:`1px solid ${allD?"#22C55E33":ex.isCore?C.gold+"55":C.cb}`,borderRadius:14,padding:"14px 16px",marginBottom:10,borderLeft:ex.isCore?`3px solid ${C.gold}`:undefined,transition:"all .3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>{setExpanded(isExp?null:ei);if(editing!==null)setEditing(null);}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:allD?C.grn:C.txt}}>{ex.name}</div>
                <div style={{fontSize:12,color:ex.isCore?C.gold:C.sub,fontStyle:"italic",marginTop:3}}>{ex.note}</div>
              </div>
              <div style={{fontFamily:"'Oswald'",fontSize:16,fontWeight:600,color:C.gold,whiteSpace:"nowrap",marginLeft:12}}>{ex.sets}×{ex.reps}</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>
              {(ex.primary||[]).map(m=><span key={m} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:C.gold+"22",color:C.gold}}>{m}</span>)}
              {(ex.secondary||[]).map(m=><span key={m} style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,background:"#ffffff0a",color:C.sub}}>{m}</span>)}
            </div>
            {isExp&&<div style={{marginTop:10}}>
              {isEdit?<div style={{display:"flex",flexDirection:"column",gap:6,padding:10,background:"#111",borderRadius:8,marginBottom:8}}>
                <div style={{display:"flex",gap:6}}><div style={{flex:1}}><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Sets</div><input type="number" value={editForm.sets} onChange={e=>setEditForm({...editForm,sets:e.target.value})} style={inputS}/></div><div style={{flex:1}}><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Reps</div><input value={editForm.reps} onChange={e=>setEditForm({...editForm,reps:e.target.value})} style={inputS}/></div></div>
                <div><div style={{fontSize:10,color:C.sub,marginBottom:2}}>Note</div><input value={editForm.note} onChange={e=>setEditForm({...editForm,note:e.target.value})} style={inputS}/></div>
                <div style={{display:"flex",gap:6}}><button onClick={()=>saveEdit(ei)} style={{flex:1,padding:"8px",borderRadius:8,background:C.grn,border:"none",color:"#000",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'"}}>Save</button><button onClick={()=>setEditing(null)} style={{padding:"8px 12px",borderRadius:8,background:"none",border:"1px solid #333",color:C.sub,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans'"}}>Cancel</button></div>
              </div>:<>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <button onClick={e=>{e.stopPropagation();startEdit(ei);}} style={smallBtn}>✎ Edit</button>
                  <button onClick={e=>{e.stopPropagation();moveExercise(ei,-1);}} style={smallBtn}>↑</button>
                  <button onClick={e=>{e.stopPropagation();moveExercise(ei,1);}} style={smallBtn}>↓</button>
                  <RemoveBtn label="✕" onConfirm={()=>removeExercise(ei)} style={{...smallBtn,borderColor:C.red+"44",color:C.red}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{color:C.sub,fontSize:12}}>Weight:</span>
                  <input type="text" placeholder="e.g. 135" value={wts[wKey]||""} onChange={e=>{const n={...wts,[wKey]:e.target.value};setWts(n);save({wts:n});}} style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"6px 10px",color:C.txt,fontSize:12,width:90,outline:"none",fontFamily:"'DM Sans'"}}/>
                  <span style={{fontSize:11,color:C.mut}}>lbs</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {Array.from({length:ex.sets},(_,si)=>{const key=`${vd}-${ei}-${si}`;const done=!!sets[key];
                    return <button key={si} onClick={()=>toggleSet(key)} style={{width:46,height:46,borderRadius:"50%",border:`2px solid ${done?C.grn:"#333"}`,background:done?C.grn:"transparent",color:done?"#000":C.sub,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans'",transition:"all .2s ease"}}>{done?"✓":si+1}</button>;
                  })}
                </div>
              </>}
            </div>}
          </div>
        );
      })}
      {!adding?<button onClick={()=>setAdding(true)} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed #333",background:"transparent",color:C.sub,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'",marginTop:4}}>+ Add Exercise</button>:<AddBox {...{addName,setAddName,addExercise,setAdding}}/>}
      <div style={{height:16}}/>
    </div>
  );
}

function AddBox({addName,setAddName,addExercise,setAdding}){
  return <Card><div style={{fontSize:12,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Add Exercise</div><div style={{fontSize:11,color:C.sub,marginBottom:8}}>Type any exercise — muscles detected automatically.</div><div style={{display:"flex",gap:8}}><input placeholder="e.g. Dumbbell Flyes, Cable Crunches..." value={addName} onChange={e=>setAddName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExercise()} style={{...inputS,flex:1,fontSize:14}}/><button onClick={addExercise} style={{padding:"10px 16px",borderRadius:8,background:C.gold,border:"none",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'",whiteSpace:"nowrap"}}>Add</button></div><button onClick={()=>setAdding(false)} style={{marginTop:8,background:"none",border:"none",color:C.sub,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans'"}}>Cancel</button></Card>;
}

/* ═══════ NUTRITION VIEW ═══════ */
function NutritionView({meals,setMeals,tots,macros,sched,save}){
  const[desc,setDesc]=useState("");
  const[aiResult,setAiResult]=useState(null);
  const[showManual,setShowManual]=useState(false);

/* ═══════ TRACKER VIEW ═══════ */
function TrackerView({hist,workouts,todayIdx}){
  const wm={};const now=new Date();
  for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);const h=hist[dk(d)];if(h?.muscles)Object.entries(h.muscles).forEach(([m,v])=>{wm[m]=(wm[m]||0)+v;});const dow=d.getDay();if((dow===2||dow===5)&&h){["Quads","Hamstrings","Glutes","Calves","Core","Hip Flexors"].forEach(m=>{wm[m]=(wm[m]||0)+2;});}}
  const mx=Math.max(1,...Object.values(wm));
  const getHC=v=>{if(!v)return"#1a1a1a";const p=v/mx;return p>.7?C.grn:p>.4?C.gold:"#D4A84366";};
  const streak=(()=>{let s=0;const d=new Date();d.setDate(d.getDate()-1);while(hist[dk(d)]){s++;d.setDate(d.getDate()-1);}return s;})();
  const l14=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);l14.push({date:dk(d).slice(5),dn:["S","M","T","W","T","F","S"][d.getDay()],data:hist[dk(d)]||null});}
  const pD=l14.filter(d=>d.data?.p).map(d=>({label:d.date,val:d.data.p}));
  const cD=l14.filter(d=>d.data?.cal).map(d=>({label:d.date,val:d.data.cal}));
  const wD=Object.entries(hist).filter(([_,v])=>v.bw).sort(([a],[b])=>a.localeCompare(b)).slice(-14).map(([d,v])=>({label:d.slice(5),val:+v.bw}));
  const wDays=l14.filter(d=>d.data?.setsT>0);const cDays=wDays.filter(d=>d.data.setsD===d.data.setsT).length;
  const upper=["Chest","Front Delts","Side Delts","Rear Delts","Triceps","Biceps","Upper Back","Lats"].reduce((a,m)=>a+(wm[m]||0),0);
  const lower=["Quads","Hamstrings","Glutes","Calves","Hip Flexors"].reduce((a,m)=>a+(wm[m]||0),0);
  const core=wm["Core"]||0;

  return (
    <div className="fi" style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
      <div style={{fontFamily:"'Oswald'",fontSize:28,fontWeight:700}}>TRACKER</div>
      <div style={{fontSize:12,color:C.gold,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginTop:-8}}>{streak>0?`${streak} day streak`:"Day 1"} · Week {wk()}</div>
      <div style={{display:"flex",gap:8}}>{[{n:streak,l:"Streak"},{n:`${cDays}/${wDays.length}`,l:"Workouts"},{n:`Wk ${wk()}`,l:"of 4"}].map((s,i)=>(<div key={i} style={{flex:1,background:C.card,borderRadius:12,padding:"12px 10px",textAlign:"center",border:`1px solid ${C.cb}`}}><div style={{fontFamily:"'Oswald'",fontSize:22,fontWeight:700,color:C.gold}}>{s.n}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>))}</div>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Muscle Coverage · This Week</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>{[{l:"Upper",v:upper,c:C.blu},{l:"Lower",v:lower,c:C.grn},{l:"Core",v:core,c:C.gold}].map((g,i)=>(<div key={i} style={{flex:1,textAlign:"center",padding:"10px 0",background:g.c+"15",borderRadius:10,border:`1px solid ${g.c}33`}}><div style={{fontFamily:"'Oswald'",fontSize:20,fontWeight:700,color:g.c}}>{g.v}</div><div style={{fontSize:10,color:C.sub,textTransform:"uppercase"}}>{g.l}</div></div>))}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{MUSCLES.map(m=>{const v=wm[m]||0;const col=getHC(v);return <div key={m} style={{padding:"6px 10px",borderRadius:8,background:col+"22",border:`1px solid ${col}55`,fontSize:11,fontWeight:600,color:v?col:C.mut}}>{m}{v>0&&<span style={{fontWeight:700}}> ·{v}</span>}</div>;})}</div>
        <div style={{display:"flex",gap:12,marginTop:12,fontSize:10,color:C.sub}}>{[{c:C.grn,l:"High"},{c:C.gold,l:"Med"},{c:"#D4A84366",l:"Light"},{c:"#1a1a1a",l:"None"}].map(x=><span key={x.l}><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:x.c,marginRight:4}}/>{x.l}</span>)}</div>
      </Card>
      <Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>14-Day Activity</div><div style={{display:"flex",gap:4,justifyContent:"space-between"}}>{l14.map((d,i)=>{const w=d.data?.setsT>0;const ok=w&&d.data.setsD===d.data.setsT;return <div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:9,color:C.mut,marginBottom:3}}>{d.dn}</div><div style={{height:28,borderRadius:4,background:ok?C.grn:w?"#D4A84366":d.data?"#ffffff15":"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:ok?"#000":C.mut}}>{ok?"✓":w?"½":""}</div><div style={{fontSize:8,color:C.mut,marginTop:2}}>{d.date}</div></div>;})}</div></Card>
      {pD.length>1&&<Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Protein Trend</div><MiniChart data={pD} target={155} color={C.grn} unit="g"/></Card>}
      {cD.length>1&&<Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Calorie Trend</div><MiniChart data={cD} target={2500} color={C.gold} unit=""/></Card>}
      {wD.length>1&&<Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Weight Trend</div><MiniChart data={wD} color={C.blu} unit=" lbs"/></Card>}
      <Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Weekly Averages</div>{(()=>{const d7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const h=hist[dk(d)];if(h)d7.push(h);}if(!d7.length) return <div style={{fontSize:13,color:C.mut}}>Log a few days to see averages.</div>;const avg=(a,k)=>Math.round(a.reduce((s,d)=>s+(d[k]||0),0)/a.length);return <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{[{l:"Avg Cal",v:avg(d7,"cal"),c:C.gold},{l:"Avg Protein",v:avg(d7,"p")+"g",c:C.grn},{l:"Avg Water",v:(avg(d7,"water")*.25).toFixed(1)+"L",c:C.blu},{l:"Avg Sleep",v:avg(d7,"sleep")+"h",c:C.pur}].map((s,i)=>(<div key={i} style={{flex:1,minWidth:"45%",padding:"10px 12px",background:"#111",borderRadius:10,border:"1px solid #1a1a1a"}}><div style={{fontSize:11,color:C.sub,marginBottom:2}}>{s.l}</div><div style={{fontFamily:"'Oswald'",fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div></div>))}</div>;})()}</Card>
      <div style={{height:12}}/>
    </div>
  );
}

function MiniChart({data,target,color,unit}){
  if(data.length<2) return null;
  const vals=data.map(d=>d.val);const mn=Math.min(...vals,target||Infinity)-5;const mx=Math.max(...vals,target||0)+5;const rng=mx-mn||1;const w=Math.max(260,data.length*36);const h=80;
  const pts=data.map((d,i)=>({x:16+(i/(data.length-1))*(w-32),y:h-10-((d.val-mn)/rng)*(h-25)}));
  const ln=pts.map((p,i)=>`${i?"L":"M"} ${p.x} ${p.y}`).join(" ");
  const tY=target?h-10-((target-mn)/rng)*(h-25):null;
  return <div style={{overflowX:"auto"}}><svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>{tY!=null&&<><line x1={10} y1={tY} x2={w-10} y2={tY} stroke={color} strokeWidth="1" strokeDasharray="4,4" opacity="0.3"/><text x={w-8} y={tY-4} textAnchor="end" fill={color} fontSize="8" opacity="0.5">{target}{unit}</text></>}<path d={ln} fill="none" stroke={color} strokeWidth="2"/>{pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="3" fill={color}/><text x={p.x} y={p.y-8} textAnchor="middle" fill={C.sub} fontSize="8" fontFamily="'DM Sans'">{vals[i]}{unit}</text><text x={p.x} y={h-1} textAnchor="middle" fill={C.mut} fontSize="7" fontFamily="'DM Sans'">{data[i].label}</text></g>)}</svg></div>;
}

      </Card>
      <Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Body Weight</div><div style={{display:"flex",alignItems:"center",gap:8}}><input type="number" placeholder="148" value={bw} onChange={e=>{setBw(e.target.value);save({bw:e.target.value});}} style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:8,padding:"8px 12px",color:C.txt,fontSize:20,fontWeight:700,width:90,textAlign:"center",outline:"none",fontFamily:"'Oswald'"}}/><span style={{color:C.sub,fontSize:14}}>lbs</span></div></Card>
      <Card><div style={{fontSize:13,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Daily Checklist</div>{[{l:"Protein 155g+",d:(meals||[]).reduce((a,m)=>a+(m.p||0),0)>=155},{l:"Water 3L+",d:water>=12},{l:"Creatine",d:!!supps.creatine},{l:"7+ hrs sleep",d:sleepH>=7},{l:"Weight logged",d:!!bw}].map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:c.d?1:.4}}><span style={{color:c.d?C.grn:C.mut,fontWeight:700,fontSize:14}}>{c.d?"✓":"○"}</span><span style={{fontSize:13}}>{c.l}</span></div>))}</Card>
      <div style={{height:12}}/>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
